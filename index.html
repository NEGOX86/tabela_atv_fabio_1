<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabela</title>
</head>
<body>
    <table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Nome</th>
      <th>E-mail</th>

  <tbody>

    </tr>
    <tr>
      <td>2</td>
      <td>José</td>
      <td>jose@email.com</td>
    </tr>
  </tbody>

  <tfoot>
    <tr>
      <td colspan="3">Total de registros: 2</td>
    </tr>
  </tfoot>
</table>
</body>
</html>
