<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Minha Tabela</title>
    <style>
        /* Estilo básico para a tabela não ficar "invisível" */
        table {
            width: 100%;
            border-collapse: collapse; /* Une as bordas */
            font-family: sans-serif;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2; /* Cor de fundo para o cabeçalho */
        }
        tr:nth-child(even) {
            background-color: #fafafa; /* Cor zebrada nas linhas */
        }
    </style>
</head>
<body>

    <h2>Título da Tabela</h2>

    <table>
        <thead>
            <tr>
                <th>Coluna 1</th>
                <th>Coluna 2</th>
                <th>Coluna 3</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Dado A1</td>
                <td>Dado A2</td>
                <td>Dado A3</td>
            </tr>
            <tr>
                <td>Dado B1</td>
                <td>Dado B2</td>
                <td>Dado B3</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="3">Rodapé da tabela ou observações</td>
            </tr>
        </tfoot>
    </table>

</body>
</html>
